<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clockify Overtime</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <!-- Settings View -->
      <div id="settings-container" class="settings-view">
        <h1>Settings</h1>
        <form id="settings-form" class="settings-form">
          <div class="form-group">
            <label for="api-key">Clockify API Key</label>
            <input
              id="api-key"
              type="password"
              required
              placeholder="Paste your API key from https://clockify.me/user/settings"
              autocomplete="off"
            />
            <p class="hint">
              Your API key is stored locally and never sent anywhere else.
            </p>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Save API Key</button>
            <span id="save-status"></span>
          </div>
        </form>
        <div class="settings-danger-zone">
          <button id="reset-all-btn" class="btn-danger">
            Reset all stored data
          </button>
        </div>
      </div>

      <!-- Dashboard View -->
      <div
        id="dashboard-container"
        class="dashboard-view"
        style="display: none"
      >
        <div class="dashboard-header">
          <div>
            <h1>
              Overtime
              <input id="year-select" type="number" min="1970" max="3000" />
            </h1>
            <div id="last-fetched" class="last-fetched">
              <span id="fetch-spinner" class="fetch-spinner" hidden></span>
            </div>
          </div>
          <div class="overtime-card" id="content" style="display: none">
            <div class="overtime-label">Cumulative Overtime</div>
            <div class="overtime-value" id="overtime-value">0h 0min</div>
          </div>
        </div>

        <div class="charts-container">
          <div class="chart-card">
            <h2>Daily Working Hours</h2>
            <div id="daily-chart"></div>
          </div>
        </div>

        <div class="chart-footer">
          <a
            href="#settings"
            class="btn-icon"
            aria-label="Settings"
            title="Settings"
            >&#9881;</a
          >
        </div>
      </div>
    </div>
    <script src="views://mainview/index.js"></script>
  </body>
</html>
